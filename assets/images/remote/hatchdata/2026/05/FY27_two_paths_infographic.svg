  <title
     id="ig-title">Bibb School FY27 Budget: The Range of Options</title>
  <desc
     id="ig-desc">
    Bibb County Schools faces a 23.8 million dollar FY27 deficit that the Board must close by
    Tuesday, June 2. Without action, fund balance falls from 7.8 percent (FY27) to negative
    14.3 percent (FY30); emergency loans loom. Every mill not raised must be matched by about
    5.4 million dollars of cuts somewhere on the menu. Path A, cuts-heavy: about 1.7 mills
    (roughly 9 dollars 40 cents per month on a median home) plus every cut on the menu totaling
    15.8 million dollars, including bigger class sizes, school closures, outsourcing 80
    paraprofessional jobs, a district-wide pay freeze, support-staff furloughs, eliminating
    unfilled jobs, redistricting, other small cuts, and closing the VIP Academy. Path B,
    revenue-heavy: about 4.3 mills (roughly 24 dollars per month on a median home) with only
    about 680 thousand dollars in small operational cuts and no classroom impact. Either path
    balances the FY27 budget; the difference is who pays.
  </desc>
