---
layout: default
---
<article class="page" data-reveal-stagger>
  <header class="page__header">
    {% if page.kicker %}
      <p class="page__kicker" data-reveal>{{ page.kicker }}</p>
    {% endif %}
    <h1 class="page__title" data-reveal>{{ page.title }}</h1>
    {% if page.dek %}
      <p class="page__dek" data-reveal>{{ page.dek }}</p>
    {% endif %}
  </header>

  {% if page.feature_image %}
    <figure class="post__hero" data-reveal>
      <img src="{{ page.feature_image | relative_url }}"
           alt="{{ page.feature_image_alt | default: page.title | escape }}"
           loading="eager"
           fetchpriority="high"
           decoding="async">
      {% if page.feature_image_caption %}
        <figcaption>{{ page.feature_image_caption }}</figcaption>
      {% endif %}
    </figure>
  {% endif %}

  <div class="page__body prose" data-reveal>
    {{ content }}
  </div>
</article>
