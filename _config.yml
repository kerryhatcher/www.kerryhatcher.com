title: Kerry Hatcher
author: Kerry Hatcher
email: kerry@kerryhatcher.com
description: >-
  Notes, essays, and field reports from Kerry Hatcher.
baseurl: ""
url: "https://www.kerryhatcher.com"

permalink: /:slug/
future: true
timezone: America/Chicago

pagination:
  enabled: true
  collection: posts
  per_page: 12
  permalink: '/page/:num/'
  sort_field: 'date'
  sort_reverse: true
  trail:
    before: 2
    after: 2

theme:

plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap
  - jekyll-paginate-v2

markdown: kramdown
kramdown:
  input: GFM
  syntax_highlighter: rouge
  hard_wrap: false

sass:
  style: compressed

defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: post
  - scope:
      path: ""
      type: pages
    values:
      layout: page

nav:
  - label: Home
    url: /
  - label: About
    url: /about/

social:
  - label: Email
    href: mailto:kerry@kerryhatcher.com
  - label: GitHub
    href: https://github.com/kerryhatcher

exclude:
  - vendor
  - .bundle
  - Gemfile
  - Gemfile.lock
  - PRODUCT.md
  - DESIGN.md
  - README.md
  - scripts
  - wrangler.jsonc
  - .wrangler
  - node_modules
  - .remember
  - .jekyll-cache
  - CLAUDE.md
  - justfile
  - package.json
  - package-lock.json
